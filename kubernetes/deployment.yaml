apiVersion: apps/v1
kind: Deployment

metadata:
  name: production-app
  namespace: production

spec:
  replicas: 2

  selector:
    matchLabels:
      app: production-app

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: production-app

    spec:
      containers:
        - name: production-app

          image: geetha5/production-app:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          envFrom:
            - configMapRef:
                name: production-app-config

            - secretRef:
                name: production-app-secret

          resources:

            requests:
              memory: "128Mi"
              cpu: "250m"

            limits:
              memory: "512Mi"
              cpu: "500m"

          livenessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 3000

            initialDelaySeconds: 5
            periodSeconds: 5

