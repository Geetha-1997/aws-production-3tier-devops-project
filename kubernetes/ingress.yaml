apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: production-app-ingress
  namespace: production

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /

spec:

  ingressClassName: nginx

  rules:
  - host: production.local

    http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: production-app-service

            port:

              number: 80