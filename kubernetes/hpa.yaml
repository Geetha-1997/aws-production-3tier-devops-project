apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: production-app-hpa
  namespace: production

spec:

  scaleTargetRef:

    apiVersion: apps/v1
    kind: Deployment
    name: production-app

  minReplicas: 2

  maxReplicas: 10

  metrics:

  - type: Resource

    resource:

      name: cpu

      target:

        type: Utilization

        averageUtilization: 70