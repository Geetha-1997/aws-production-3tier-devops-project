services:

  app:
    image: geetha5/production-app:latest
    container_name: production-app

    expose:
      - "3000"

    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx

    ports:
      - "80:80"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

    depends_on:
      - app

    restart: always