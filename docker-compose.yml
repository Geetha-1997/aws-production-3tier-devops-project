version: "3.9"

services:

  app:
    image: geetha5/production-app:latest
    container_name: production-app

    expose:
      - "3000"

    restart: always

  nginx:
    build:
      context: ./nginx

    container_name: nginx

    ports:
      - "80:80"

    depends_on:
      - app

    restart: always